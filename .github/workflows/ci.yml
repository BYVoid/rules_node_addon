name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  examples:
    name: Examples (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bazelisk
        run: npm install --global @bazel/bazelisk

      - name: Test examples
        run: bazel test //examples/...
