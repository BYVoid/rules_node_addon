name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  examples:
    name: Examples (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test examples
        run: npx --yes @bazel/bazelisk --nohome_rc test //examples/hello/... --verbose_failures

      - name: Test pinned Node version example
        working-directory: examples/node_version_pin
        run: npx --yes @bazel/bazelisk --nohome_rc test //... --verbose_failures
