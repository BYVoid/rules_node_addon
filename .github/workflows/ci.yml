name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  examples:
    name: Examples (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows x86_64
            os: windows-latest
          - name: Windows arm64
            os: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test examples
        run: npx --yes @bazel/bazelisk --nohome_rc test //examples/hello/... --verbose_failures

      - name: Test pinned Node version example
        working-directory: examples/node_version_pin
        run: npx --yes @bazel/bazelisk --nohome_rc test //... --verbose_failures

      - name: Test full TypeScript example
        working-directory: examples/full
        run: npx --yes @bazel/bazelisk --nohome_rc test //... --verbose_failures --test_output=errors
